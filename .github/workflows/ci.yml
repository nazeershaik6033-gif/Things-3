name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps
      - name: E2E tests (production build + service worker)
        run: npx playwright test
      - name: No layout-property animations (perf guard)
        run: |
          ! grep -rnE "transition[^;]*(width|height|top|left|margin)[^;]*;" src/styles src/components src/screens src/ui \
            && echo "OK: no layout-property transitions"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
